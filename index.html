<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="whatsapp-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Header -->
            <div class="sidebar-header">
                <h1>WhatsApp</h1>
                <div class="header-icons">
                    <button class="icon-btn" title="New chat">
                        <i class="fas fa-message"></i>
                    </button>
                    <button class="icon-btn menu-btn" title="Menu">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search or start new chat"
                >
                <i class="fas fa-search"></i>
            </div>

            <!-- Chat List -->
            <div class="chat-list" id="chatList">
                <!-- Chats will be loaded here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <!-- Chat Header -->
            <div class="chat-header" id="chatHeader">
                <div class="header-content">
                    <div class="header-info">
                        <h2 id="chatName">Select a chat</h2>
                        <p id="chatStatus">Click a chat to start messaging</p>
                    </div>
                </div>
                <div class="header-icons">
                    <button class="icon-btn" title="Voice call">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button class="icon-btn" title="Video call">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="icon-btn" title="Info">
                        <i class="fas fa-info-circle"></i>
                    </button>
                    <button class="icon-btn menu-btn" title="Menu">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>Select a chat to start messaging</p>
                </div>
            </div>

            <!-- Message Input Area -->
            <div class="input-area" id="inputArea" style="display: none;">
                <button class="icon-btn attachment-btn" title="Attach">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="Type a message..."
                    >
                    <button class="emoji-btn" title="Emoji">
                        <i class="fas fa-face-smile"></i>
                    </button>
                </div>
                <button class="send-btn" id="sendBtn" title="Send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Emoji Picker Modal -->
    <div class="emoji-picker-modal" id="emojiPickerModal">
        <div class="emoji-picker-content">
            <div class="emoji-header">
                <h3>Select Emoji</h3>
                <button class="close-btn">&times;</button>
            </div>
            <div class="emoji-grid" id="emojiGrid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
